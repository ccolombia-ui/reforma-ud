name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal-next/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy-vercel.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # v5.0d fix · pnpm version la lee del packageManager del package.json
      # (NO se especifica `version:` aquí para evitar el conflict
      # ERR_PNPM_BAD_PM_VERSION que rompió todos los deploys v4.5+/v5.0)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build portal-next
        run: pnpm --filter portal-next build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/portal-next
          vercel-args: '--prod'
