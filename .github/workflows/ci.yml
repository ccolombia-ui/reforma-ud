name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'content/drive-sync/**'   # sync commits no disparan CI completo
      - 'docs/**'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint || true   # no bloquear en fase inicial

      - name: Build portal
        run: pnpm --filter portal build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: portal-dist
          path: apps/portal/dist/
          retention-days: 7
